mqtt:
  - climate:
      unique_id: "hvac_ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>"
      name: "ONOKOM-AIR-TN-1-MB-B"
      power_command_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Active/on"
      power_command_template: >-
        {% if value == 'OFF' %} 0
        {% else %} 1
        {% endif %} 
      modes:
        - "off"
        - "fan_only"
        - "heat"
        - "auto"
      mode_state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Active mode"
      mode_state_template: >-
        {% set m = value | string %}
        {% if   m == '0' %} off
        {% elif m == '1' %} fan_only
        {% elif m == '2' %} heat
        {% elif m == '3' %} auto
        {% else %} off
        {% endif %}
      mode_command_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Active mode/on"
      mode_command_template: >-
        {% if   value == 'off' %} 0
        {% elif value == 'fan_only' %} 1
        {% elif value == 'heat' %} 2
        {% elif value == 'auto' %} 3
        {% else %} 0
        {% endif %}
      temperature_state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Target temperature"
      temperature_command_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Target temperature/on"
      min_temp: 0
      max_temp: 30
      precision: 1
      temp_step: 1
      fan_modes:
        - "Авто"
        - "1 Скорость"
        - "2 Скорость"
        - "3 Скорость"
        - "4 Скорость"
        - "5 Скорость"
        - "6 Скорость"
      fan_mode_state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Fan speed"
      fan_mode_state_template: >-
        {% set  m = value | int %}
        {% if   m == 0 %} Авто
        {% elif m == 1 %} 1 Скорость
        {% elif m == 2 %} 2 Скорость
        {% elif m == 3 %} 3 Скорость
        {% elif m == 4 %} 4 Скорость
        {% elif m == 5 %} 5 Скорость
        {% elif m == 6 %} 6 Скорость
        {% else %} Авто
        {% endif %}
      fan_mode_command_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Fan speed/on"
      fan_mode_command_template: >-
        {% if   value == 'Авто' %} 0
        {% elif value == '1 Скорость' %} 1
        {% elif value == '2 Скорость' %} 2
        {% elif value == '3 Скорость' %} 3
        {% elif value == '4 Скорость' %} 4
        {% elif value == '5 Скорость' %} 5
        {% elif value == '6 Скорость' %} 6
        {% endif %}
  - select:
      unique_id: "hvac_fan_speed_<впишите modbus-адрес устройства сюда>"
      name: "Скорость вентилятора"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Fan speed"
      command_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Fan speed/on"
      options:
        - "Авто"
        - "1 Скорость"
        - "2 Скорость"
        - "3 Скорость"
        - "4 Скорость"
        - "5 Скорость"
        - "6 Скорость"
      value_template: >-
        {% set  m = value | int %}
        {% if   m == 0 %} Авто
        {% elif m == 1 %} 1 Скорость
        {% elif m == 2 %} 2 Скорость
        {% elif m == 3 %} 3 Скорость
        {% elif m == 4 %} 4 Скорость
        {% elif m == 5 %} 5 Скорость
        {% elif m == 6 %} 6 Скорость
        {% else %} Авто
        {% endif %}
      command_template: >-
        {% if   value == 'Авто' %} 0
        {% elif value == '1 Скорость' %} 1
        {% elif value == '2 Скорость' %} 2
        {% elif value == '3 Скорость' %} 3
        {% elif value == '4 Скорость' %} 4
        {% elif value == '5 Скорость' %} 5
        {% elif value == '6 Скорость' %} 6
        {% endif %}
  - select:
      unique_id: "hvac_active_mode_<впишите modbus-адрес устройства сюда>"
      name: "Состояние и режим"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Active mode"
      command_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Active mode/on"
      options:
        - "Выключен"
        - "Подача воздуха с улицы, нагреватель выключен"
        - "Подача воздуха с улицы, нагреватель включен"
        - "Рециркуляция, нагреватель выключен"
      value_template: >-
        {% set  m = value | int %}
        {% if   m == 0 %} Выключен
        {% elif m == 1 %} Подача воздуха с улицы, нагреватель выключен
        {% elif m == 2 %} Подача воздуха с улицы, нагреватель включен
        {% elif m == 3 %} Рециркуляция, нагреватель выключен
        {% else %} Выключен
        {% endif %}
      command_template: >-
        {% if   value == 'Выключен' %} 0
        {% elif value == 'Подача воздуха с улицы, нагреватель выключен' %} 1
        {% elif value == 'Подача воздуха с улицы, нагреватель включен' %} 2
        {% elif value == 'Рециркуляция, нагреватель выключен' %} 3
        {% endif %}
  - switch:
      unique_id: "hvac_screen_light_<впишите modbus-адрес устройства сюда>"
      name: "Подсветка экрана"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Screen light"
      command_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Screen light/on"
      payload_on: "1"
      payload_off: "0"
      state_on: "1"
      state_off: "0"
      icon: "mdi:monitor"
  - switch:
      unique_id: "hvac_outdoor_air_supply_<впишите modbus-адрес устройства сюда>"
      name: "Подача воздуха с улицы"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Outdoor air supply"
      command_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Outdoor air supply/on"
      payload_on: "1"
      payload_off: "0"
      state_on: "1"
      state_off: "0"
      icon: "mdi:air-filter"
  - switch:
      unique_id: "hvac_beeper_<впишите modbus-адрес устройства сюда>"
      name: "Звуковая индикация"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Beeper"
      command_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Beeper/on"
      payload_on: "1"
      payload_off: "0"
      state_on: "1"
      state_off: "0"
      icon: "mdi:volume-high"
  - switch:
      unique_id: "hvac_heater_<впишите modbus-адрес устройства сюда>"
      name: "Нагреватель"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Heater"
      command_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Heater/on"
      payload_on: "1"
      payload_off: "0"
      state_on: "1"
      state_off: "0"
      icon: "mdi:heat-wave"
  - sensor:
      unique_id: "hvac_ac_connected_<впишите modbus-адрес устройства сюда>"
      name: "Кондиционер подключен"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/AC connected"
      icon: "mdi:air-conditioner"
      value_template: "{{ value | int == 1 and 'Подключен' or 'Не подключен' }}"
  - sensor:
      unique_id: "hvac_outdoor_air_temperature_<впишите modbus-адрес устройства сюда>"
      name: "Температура воздуха на улице"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Outdoor air temperature"
      icon: "mdi:home-thermometer-outline"
      unit_of_measurement: "°C"
      device_class: "temperature"
      state_class: "measurement"
      value_template: "{{ value | float }}"
  - sensor:
      unique_id: "hvac_inlet_air_temperature_<впишите modbus-адрес устройства сюда>"
      name: "Температура входящего воздуха"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Inlet air temperature"
      icon: "mdi:thermometer"
      unit_of_measurement: "°C"
      device_class: "temperature"
      state_class: "measurement"
      value_template: "{{ value | float }}"
  - sensor:
      unique_id: "hvac_airflow_counter_<впишите modbus-адрес устройства сюда>"
      name: "Счётчик наработки прибора"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Airflow counter"
      icon: "mdi:timer-sand"
      unit_of_measurement: "m³"
  - sensor:
      unique_id: "hvac_control_board_temperature_<впишите modbus-адрес устройства сюда>"
      name: "Температура платы управления"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Control board temperature"
      icon: "mdi:thermometer"
      unit_of_measurement: "°C"
      device_class: "temperature"
      state_class: "measurement"
      value_template: "{{ value | float }}"
  - sensor:
      unique_id: "hvac_current_heater_power_<впишите modbus-адрес устройства сюда>"
      name: "Текущая мощность нагревателя"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Current heater power"
      icon: "mdi:lightning-bolt-circle"
  - sensor:
      unique_id: "hvac_electronics_operating_time_counter_<впишите modbus-адрес устройства сюда>"
      name: "Счётчик наработки электроники"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Electronics operating time counter"
      icon: "mdi:counter"
      unit_of_measurement: "d"
  - sensor:
      unique_id: "hvac_heater_type_<впишите modbus-адрес устройства сюда>"
      name: "Тип нагревателя"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Heater type"
      icon: "mdi:heat-pump"
      value_template: >-
        {% set m = value | int %}
        {% if m == 0 %} none
        {% elif m == 1 %} 1 kWt
        {% elif m == 2 %} 1.4 kWt
        {% else %} unknown
        {% endif %}
  - sensor:
      unique_id: "hvac_motor_operating_time_counter_<впишите modbus-адрес устройства сюда>"
      name: "Счётчик наработки вентилятора"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Motor operating time counter"
      icon: "mdi:timer-sand"
      unit_of_measurement: "m³"
  - sensor:
      unique_id: "hvac_power_board_temperature_<впишите modbus-адрес устройства сюда>"
      name: "Температура платы питания"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Power board temperature"
      icon: "mdi:thermometer"
      unit_of_measurement: "°C"
      device_class: "temperature"
      state_class: "measurement"
      value_template: "{{ value | float }}"
  - sensor:
      unique_id: "hvac_days_to_filter_replace_<впишите modbus-адрес устройства сюда>"
      name: "Дней до замены фильтра"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Days to filter replace"
      icon: "mdi:hvac"
  - sensor:
      unique_id: "hvac_filter_life_level_<впишите modbus-адрес устройства сюда>"
      name: "Состояние фильтра"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Filter life level"
      icon: "mdi:air-filter"
  - sensor:
      unique_id: "hvac_timer_enabled_<впишите modbus-адрес устройства сюда>"
      name: "Состояние таймера"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Timer: Enabled"
      icon: "mdi:timer-check"
  - sensor:
      unique_id: "hvac_timer_id_<впишите modbus-адрес устройства сюда>"
      name: "Порядковый номер таймера"
      state_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Timer: ID"
      icon: "mdi:timer"
  - button:
      unique_id: "hvac_reset_filter_counter_<впишите modbus-адрес устройства сюда>"
      name: "Сбросить счетчик фильтра"
      command_topic: "/devices/ONOKOM-AIR-TN-1-MB-B_<впишите modbus-адрес устройства сюда>/controls/Reset filter counter/on"
      payload_press: "1"
      icon: "mdi:undo"
